# Chiribito — Render Infrastructure as Code (staging, zero-cost path)
#
# Three web services + one Key Value (Redis) + one Postgres in Frankfurt,
# all on Render's FREE tier. Designed to be applied as a Render Blueprint:
#   https://dashboard.render.com → Blueprints → New Blueprint Instance →
#   pick this repo → "Apply"
#
# Free-tier reality (verified 2026-05-17 — Render's free tier limits):
#   Web services      512 MB RAM, 0.1 CPU, 750 instance-hours/month total,
#                     sleeps after 15 min idle (HTTP + WebSocket count as
#                     activity), cold start 30-60 s on wake.
#   PostgreSQL        256 MB RAM, 1 GB storage, expires 30 DAYS after creation
#                     (14 day grace then deleted). For staging beyond
#                     1 month you must upgrade to a paid plan ($7/mo).
#   Key Value (Redis) 25 MB memory, 50 conns, NO persistence (cache only).
#   Static site       free with no practical limits for our build size.
#
# Implications for Chiribito playtesting:
#   - First request of the day to api/game can take ~30-60 s while the
#     server wakes. After that snappy until 15 min of zero activity.
#   - The game server sleeps when the room is empty. Re-joiners pay the
#     cold-start tax. Acceptable for announced private playtests.
#   - The Postgres clock starts the day the database is created. Mark
#     30 days from then on your calendar to either upgrade or recreate.
#
# To upgrade any service later: in the Render dashboard, Service →
# Settings → Plan → pick `starter` (Web $7/mo, Postgres $7/mo,
# Key Value $10/mo) — no code change needed.
#
# Conventions:
#   value: …    committed by intent — same across deploys.
#   sync: false set manually in the Render dashboard before first deploy.
#               Lives in `Environment` tab per service.
#   fromDatabase / fromService → resolved automatically by Render at deploy time.
#
# What needs your hand (one time, before first deploy):
#   On chiribito-api:        JWT_SECRET, INTERNAL_API_SECRET, RESEND_API_KEY,
#                            LOGTAIL_SOURCE_TOKEN (optional),
#                            ALLOWED_ORIGINS, FRONTEND_URL
#   On chiribito-colyseus:   JWT_SECRET (same value as api), INTERNAL_API_SECRET
#                            (same value as api), MONITOR_USER, MONITOR_PASSWORD,
#                            LOGTAIL_SOURCE_TOKEN (optional),
#                            API_URL, ALLOWED_ORIGINS
#   On chiribito-frontend:   VITE_API_URL, VITE_WS_URL
#
# All `*_URL` and `ALLOWED_ORIGINS` values must include scheme (https://, wss://).
# Render's `property: host` returns bare hostname so we cannot derive them
# automatically. See DEPLOY.md for the exact strings to paste.

services:
  # ─────────────────────────────────────────────────────────────────────
  # Redis (sessions, rate-limit buckets, tokenVersion cache, ranking cache)
  # ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: chiribito-redis
    plan: free
    region: frankfurt
    ipAllowList: []   # only services in this Render account
    maxmemoryPolicy: allkeys-lru

  # ─────────────────────────────────────────────────────────────────────
  # 1. API server (Express + TypeORM + Postgres + Redis)
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: chiribito-api
    env: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: api-server
    buildCommand: npm ci && npm run build
    startCommand: npm run start:migrate
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

      # Secrets — set manually in Render dashboard.
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

      # Database (managed by Render).
      - key: DB_HOST
        fromDatabase: { name: chiribito-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: chiribito-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: chiribito-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: chiribito-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: chiribito-postgres, property: password }
      - key: DB_SSL
        value: "true"

      # Redis (managed by Render).
      - key: REDIS_URL
        fromService: { type: redis, name: chiribito-redis, property: connectionString }

      # URLs with scheme — set manually in dashboard (Render `property: host`
      # only gives bare hostname). After first deploy, paste:
      #   ALLOWED_ORIGINS: https://chiribito-frontend.onrender.com
      #   FRONTEND_URL:    https://chiribito-frontend.onrender.com
      # If you later wire a custom domain (e.g. staging.chiribito.com),
      # update these to include https://staging.chiribito.com (and keep
      # the .onrender.com one too if you want both to work).
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

      # Email sender identity.
      - key: RESEND_FROM_EMAIL
        value: no-reply@chiribito.com

      # Auth token-version cache tuning.
      - key: AUTH_TOKEN_VERSION_CACHE_ENABLED
        value: "true"
      - key: AUTH_TOKEN_VERSION_CACHE_TTL_MS
        value: "60000"

      # Logging
      - key: LOG_LEVEL
        value: info

  # ─────────────────────────────────────────────────────────────────────
  # 2. Game server (Colyseus + WebSockets)
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: chiribito-colyseus
    env: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build:game
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "2567"

      # Secrets — set manually in Render dashboard.
      # JWT_SECRET MUST be identical to the api-server's.
      # INTERNAL_API_SECRET MUST be identical to the api-server's.
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      - key: MONITOR_USER
        sync: false
      - key: MONITOR_PASSWORD
        sync: false
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

      # URL with scheme — set manually in dashboard. After first deploy:
      #   API_URL: https://chiribito-api.onrender.com
      - key: API_URL
        sync: false

      # Database (env validation only — the game server does not write here).
      - key: DB_HOST
        fromDatabase: { name: chiribito-postgres, property: host }
      - key: DB_USER
        fromDatabase: { name: chiribito-postgres, property: user }
      - key: DB_NAME
        fromDatabase: { name: chiribito-postgres, property: database }

      # Redis (sessions + tokenVersion cache).
      - key: REDIS_URL
        fromService: { type: redis, name: chiribito-redis, property: connectionString }
      - key: REDIS_PREFIX
        value: chiribito

      # CORS for the Colyseus HTTP handshake — set manually in dashboard:
      #   ALLOWED_ORIGINS: https://chiribito-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

      # Runtime tuning.
      - key: TURN_TIMEOUT_MS
        value: "60000"
      - key: HEARTBEAT_INTERVAL_MS
        value: "30000"
      - key: HEARTBEAT_TIMEOUT_MS
        value: "180000"
      - key: HEARTBEAT_DISCONNECT_ENABLED
        value: "true"
      - key: ACTION_COOLDOWN_MS
        value: "200"
      - key: AUTH_TOKEN_VERSION_CACHE_ENABLED
        value: "true"
      - key: AUTH_TOKEN_VERSION_CACHE_TTL_MS
        value: "60000"

      - key: LOG_LEVEL
        value: info

  # ─────────────────────────────────────────────────────────────────────
  # 3. Frontend (Vite static build)
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: chiribito-frontend
    env: static
    plan: free
    region: frankfurt
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URLs with scheme — set manually in dashboard. After first deploy:
      #   VITE_API_URL: https://chiribito-api.onrender.com
      #   VITE_WS_URL:  wss://chiribito-colyseus.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false

# ───────────────────────────────────────────────────────────────────────
# Managed PostgreSQL
# ───────────────────────────────────────────────────────────────────────
databases:
  - name: chiribito-postgres
    databaseName: chiribito
    user: chiribito
    region: frankfurt
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []   # only services in the same Render account
