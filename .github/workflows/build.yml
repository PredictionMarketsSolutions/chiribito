# Build y comprobaciones estáticas del proyecto.
name: Build and Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against committed env files
        run: |
          set -e
          # Fail if any .env file (other than .env.example) is committed.
          leaked=$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '\.env(\..+)?\.example$' || true)
          if [ -n "$leaked" ]; then
            echo "::error::Committed env files detected (only .env.example is allowed):"
            echo "$leaked"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build game server
        run: npm run build:game

      - name: Build API server
        run: npm run build:api
