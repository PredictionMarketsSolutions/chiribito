# Test y cobertura: backend (Jest), frontend (Vitest), API server (Jest).
# En PRs comenta el reporte de cobertura del backend.
name: Test and Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

# The "Comment PR with coverage" step needs write access to post the coverage comment on PRs.
# Without this the default GITHUB_TOKEN is read-only and the step fails with 403 on pull_request
# events (it passes on push because there is no PR to comment on).
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run backend tests with coverage
        run: npm run test:jest -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x'
        continue-on-error: true # a failed coverage comment (e.g. restricted token) must not fail CI
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './coverage/coverage-summary.json';
            if (!fs.existsSync(path)) {
              console.warn('coverage-summary.json not found, skipping comment');
              return;
            }
            const coverage = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = coverage.total || {};
            const pct = (t) => (t && typeof t.pct !== 'undefined' ? t.pct : 'N/A');
            const comment = `## Test Coverage Report (backend)

            | Metric      | Coverage |
            |-------------|----------|
            | Lines       | ${pct(total.lines)}% |
            | Statements  | ${pct(total.statements)}% |
            | Functions   | ${pct(total.functions)}% |
            | Branches    | ${pct(total.branches)}% |
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes('## Test Coverage Report (backend)')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test

  test-api:
    name: API server tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache API server node_modules
        uses: actions/cache@v4
        with:
          path: api-server/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('api-server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-api-

      - name: Install API server dependencies
        run: cd api-server && npm ci

      - name: Run API server tests
        run: cd api-server && npm run test
